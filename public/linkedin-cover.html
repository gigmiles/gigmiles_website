<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1128px; height: 191px; overflow: hidden; }

  .cover {
    width: 1128px;
    height: 191px;
    background: linear-gradient(135deg, #0a0a0a 0%, #111111 60%, #0d1a0d 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    position: relative;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Subtle grid lines */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 80, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 80, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .left {
    position: relative;
    z-index: 1;
  }

  .tagline {
    font-size: 36px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .tagline span {
    color: #22c55e;
  }

  .sub {
    margin-top: 10px;
    font-size: 15px;
    color: #6b7280;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .right {
    display: none;
  }

  /* Gauge SVG */
  .gauge-wrap {
    opacity: 0.9;
  }

  .url {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    font-weight: 600;
    color: #22c55e;
    letter-spacing: 1px;
    z-index: 1;
    opacity: 1;
  }

  /* Glow accent line */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #22c55e, transparent);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="left">
    <div class="tagline">Know what you<br><span>actually keep.</span></div>
    <div class="sub">Real earnings tracking for gig workers</div>
  </div>

  <div class="right">
    <div class="gauge-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer ring -->
        <circle cx="65" cy="65" r="60" stroke="#1a1a1a" stroke-width="8"/>
        <!-- Track -->
        <path d="M 15 80 A 50 50 0 1 1 115 80" stroke="#1f1f1f" stroke-width="10" stroke-linecap="round" fill="none"/>
        <!-- Green arc — filled to ~65% -->
        <path d="M 15 80 A 50 50 0 1 1 115 80" stroke="url(#gaugeGrad)" stroke-width="10" stroke-linecap="round" fill="none"
          stroke-dasharray="188 290" stroke-dashoffset="0"/>
        <!-- Center dot -->
        <circle cx="65" cy="65" r="6" fill="#22c55e"/>
        <!-- Needle -->
        <line x1="65" y1="65" x2="100" y2="35" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Tick marks -->
        <line x1="15" y1="80" x2="20" y2="80" stroke="#333" stroke-width="2"/>
        <line x1="29" y1="46" x2="33" y2="50" stroke="#333" stroke-width="2"/>
        <line x1="65" y1="15" x2="65" y2="21" stroke="#333" stroke-width="2"/>
        <line x1="101" y1="46" x2="97" y2="50" stroke="#333" stroke-width="2"/>
        <line x1="115" y1="80" x2="110" y2="80" stroke="#333" stroke-width="2"/>
        <!-- Labels -->
        <text x="8" y="95" fill="#4b5563" font-size="10" font-family="sans-serif">$0</text>
        <text x="103" y="95" fill="#4b5563" font-size="10" font-family="sans-serif">NET</text>
        <!-- Glow -->
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#16a34a"/>
            <stop offset="100%" stop-color="#22c55e"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>
    </div>
  </div>

  <div class="url">gigmiles.app</div>
  <div class="accent-line"></div>
</div>
</body>
</html>
